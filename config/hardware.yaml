# LawnBerry hardware configuration

gps:
  type: ZED-F9P
  usb_device: /dev/lawnberry-gps
  # Offset from the mower navigation point/body center to the GPS antenna.
  # Positive forward/right; negative behind/left. 1.5 ft ≈ 0.46 m.
  antenna_offset_forward_m: -0.46
  antenna_offset_right_m: 0.0
  # Fixed display-only nudge for local map imagery alignment.
  # Positive north/east; negative south/west. This does not affect navigation.
  map_display_offset_north_m: 0.0
  map_display_offset_east_m: 0.0
imu:
  type: BNO085
  port: /dev/ttyAMA4
  yaw_offset_degrees: 0
sensors:
  tof:
  - left
  - right
  tof_config:
    bus: 1
    left_address: 41
    right_address: 48
    ranging_mode: best_accuracy
    left_shutdown_gpio: 22
    right_shutdown_gpio: 23
    timing_budget_us: 66000  # 66 ms (better_accuracy) — 3× faster response for obstacle detection
power_monitor: true
ina3221:
  shunt_ohms_ch1: 0.0025
  shunt_ohms_ch3: 0.0015
victron:
  enabled: true
  device_id: EC:1A:A8:DD:99:C2
  encryption_key: b8e2843ce61217e9a5cc4a81dff4da0b
  cli_path: victron-ble
  adapter: null
  prefer_battery: true
  prefer_solar: true
  prefer_load: true
motor_controller: robohat-rp2040
# Explicit RoboHAT serial port — leave blank for auto-discovery (tries /dev/robohat,
# /dev/serial0, ttyAMA*, ttyACM* in order; IMU on ttyAMA4 is always excluded).
# Set to /dev/serial0 to prefer the GPIO UART header over USB, or /dev/ttyACM0 for USB only.
motor_controller_port: /dev/serial0
blade_controller: ibt-4
encoders:
  enabled: false
battery:
  chemistry: lifepo4
  capacity_ah: 30.0
  capacity_wh: 384.0
  nominal_voltage: 12.8
  min_voltage: 10.0
  max_voltage: 14.6
gps_ntrip_enabled: true
