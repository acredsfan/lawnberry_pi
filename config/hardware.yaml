# LawnBerry hardware configuration
# Auto-updated by GPS calibration — manual edits are preserved in other keys.

gps:
  type: ZED-F9P
  position_offset:
    lat_m: 0.0
    lon_m: 0.0
imu:
  type: BNO085
  port: /dev/ttyAMA4
  yaw_offset_degrees: 180
sensors:
  tof:
  - left
  - right
  tof_config:
    bus: 1
    left_address: 41
    right_address: 48
    ranging_mode: best_accuracy
    left_shutdown_gpio: 22
    right_shutdown_gpio: 23
    timing_budget_us: 200000
power_monitor: true
ina3221:
  shunt_ohms_ch1: 0.0025
  shunt_ohms_ch3: 0.0015
victron:
  enabled: true
  device_id: EC:1A:A8:DD:99:C2
  encryption_key: b8e2843ce61217e9a5cc4a81dff4da0b
  cli_path: victron-ble
  adapter: null
  prefer_battery: true
  prefer_solar: true
  prefer_load: true
motor_controller: robohat-rp2040
blade_controller: ibt-4
encoders:
  enabled: false
battery:
  chemistry: lifepo4
  capacity_ah: 30.0
  capacity_wh: 384.0
  nominal_voltage: 12.8
  min_voltage: 10.0
  max_voltage: 14.6
gps_ntrip_enabled: true
