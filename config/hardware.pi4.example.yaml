# Complete Raspberry Pi 4B hardware template for config/hardware.yaml.
# Copy with scripts/manage_hardware_config.py; verify every pin and device path before SIM_MODE=0.

gps:
  type: ZED-F9P
  usb_device: /dev/lawnberry-gps
  antenna_offset_forward_m: 0.0
  antenna_offset_right_m: 0.0
gps_ntrip_enabled: false

imu:
  type: BNO085
  port: /dev/ttyAMA4
  yaw_offset_degrees: 0.0

encoders:
  enabled: true

sensors:
  tof:
    - left
    - right
  tof_config:
    bus: 1
    left_address: 41
    right_address: 48
    ranging_mode: better_accuracy
    left_shutdown_gpio: 22
    right_shutdown_gpio: 23
    left_interrupt_gpio: 6
    right_interrupt_gpio: null
    timing_budget_us: 66000

bme280:
  enabled: true
  bus: 1
  address: 118
  sea_level_hpa: 1013.25

power_monitor: true
ina3221:
  bus: 1
  address: 64
  shunt_ohms_ch1: null
  shunt_ohms_ch2: null
  shunt_ohms_ch3: null
  shunt_spec_ch1: null
  shunt_spec_ch2: null
  shunt_spec_ch3: null
  battery_voltage_offset_v: 0.0
  battery_voltage_scale: 1.0
  solar_voltage_offset_v: 0.0
  solar_voltage_scale: 1.0
  solar_current_scale: 1.0
  battery_current_offset_a: 0.0

victron:
  enabled: false
  device_id: null
  device_key: null
  encryption_key: null
  cli_path: victron-ble
  adapter: null
  read_timeout_s: 8.0
  prefer_battery: false
  prefer_solar: false
  prefer_load: false
  sample_limit: 1
  yield_today_unit: wh
  solar_panel_max_wh: 1000.0

battery:
  chemistry: lifepo4
  capacity_ah: 30.0
  capacity_wh: 384.0
  nominal_voltage: 12.8
  min_voltage: 10.0
  max_voltage: 14.6
  return_reserve_percent: 20.0
  critical_soc_percent: 5.0
  mission_wh_per_meter: 0.08
  mission_fixed_overhead_wh: 3.0
  max_sample_age_seconds: 15.0

motor_controller: robohat-rp2040
motor_controller_port: null

blade_controller: ibt-4
blade:
  controller: ibt-4
  allow_autonomous: false
  spinup_seconds: 2.0
  shutdown_timeout_seconds: 1.0
  command_ack_timeout_seconds: 0.5
  pins:
    in1: 26
    in2: 27

camera_enabled: true
