name: deps-lock
on: [pull_request]
jobs:
  uv-lock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v3
      - name: Ensure lockfile present
        run: test -f uv.lock
      - name: Verify lock is up-to-date
        run: uv lock --locked
      - name: Ban Windows-only deps
        run: |
          # Reject any Windows-tagged wheels in pyproject.toml.
          ! grep -Ei '(pywin32|win32|msvc|win_amd64)' pyproject.toml
          # Note: x86_64 used to be banned too, but tool.uv.environments
          # now legitimately lists 'platform_machine == "x86_64"' so CI
          # (Intel Linux) can resolve the lockfile. The ban became a
          # false positive against its own configuration.
      - name: Ban Coral pkgs in main env
        run: "! grep -Ei '\\b(pycoral|edgetpu)\\b' pyproject.toml"
