name: CI
on: [push, pull_request]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install project dependencies (locked)
        run: uv sync --frozen

      - name: Install dev tools
        # Pin ruff version so CI and local devs share rule set; bumping ruff
        # introduces new rule families (e.g. UP042 in 0.14+) that need a
        # deliberate cleanup pass before being enforced.
        run: pip install 'ruff==0.13.3'

      - name: Lint (ruff)
        run: ruff check backend/src

      - name: Run pytest (SIM_MODE=1)
        env:
          SIM_MODE: '1'
        run: uv run pytest -q

  openapi-schema:
    runs-on: ubuntu-latest
    needs: backend-ci
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install project dependencies (locked)
        run: uv sync --frozen

      - name: Generate OpenAPI schema
        env:
          SIM_MODE: '1'
          LAWNBERRY_SKIP_HW_INIT: '1'
        run: uv run python scripts/generate_openapi.py openapi.generated.json

      - name: Diff against committed snapshot
        run: |
          if ! diff -u openapi.json openapi.generated.json; then
            echo ""
            echo "ERROR: OpenAPI schema has changed but openapi.json was not updated."
            echo "Run: uv run python scripts/generate_openapi.py openapi.json"
            echo "Then commit the updated openapi.json alongside your backend changes."
            exit 1
          fi
          echo "OpenAPI schema matches committed snapshot."
